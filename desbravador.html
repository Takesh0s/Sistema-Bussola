<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sistema Bússola — Desbravadores</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="dashboard.html"><span class="compass">🧭</span><div><span>Sistema Bússola</span></div></a>
  <div class="navbar-actions"><button class="btn btn-danger btn-sm" onclick="db.auth.signOut().then(()=>location.href='index.html')">Sair</button></div>
</nav>

<div class="page-wide fade-in">
  <div class="page-title-bar">
    <a class="back-btn" href="dashboard.html">←</a>
    <div><h1>👤 Desbravadores</h1><p>Gestão de membros, classes e especialidades</p></div>
  </div>

  <div class="two-col">
    <!-- Form -->
    <div class="card">
      <div class="card-header">
        <div class="icon">👤</div>
        <div><h2 id="formTitle">Novo Desbravador</h2></div>
      </div>

      <input type="hidden" id="editId"/>

      <div class="form-group"><label>Nome Completo</label><input type="text" id="nome" placeholder="Nome do desbravador"/></div>
      <div class="form-group"><label>Data de Nascimento</label><input type="date" id="dataNasc"/></div>
      <div class="form-group"><label>Contato / Responsável</label><input type="text" id="contato" placeholder="(00) 00000-0000"/></div>
      <div class="form-group">
        <label>Unidade</label>
        <select id="unidade"><option value="">Selecione...</option></select>
      </div>
      <div class="form-group">
        <label>Classe</label>
        <select id="classe"><option value="">Selecione...</option></select>
      </div>

      <div class="form-group">
        <label>Especialidades Concluídas</label>
        <div class="espec-box" id="especBox">
          <p style="color:var(--c-muted);font-size:.8rem;padding:4px">Carregando especialidades...</p>
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-top:4px">
        <button class="btn btn-primary" id="btnSalvar">Cadastrar</button>
        <button class="btn btn-secondary" id="btnCancelar" style="display:none">Cancelar</button>
      </div>
    </div>

    <!-- List -->
    <div class="card">
      <div class="card-header">
        <div class="icon">📋</div>
        <div>
          <h2>Membros Cadastrados</h2>
        </div>
      </div>

      <!-- Search -->
      <input type="text" id="busca" placeholder="🔍  Buscar por nome..." style="margin-bottom:12px"/>

      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Nome</th><th>Unidade</th><th>Classe</th><th>Nasc.</th><th></th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="utils.js"></script>
<script>
requireAuth();

let todosDesb = [];

async function carregarDrops() {
  const [u, c, e] = await Promise.all([
    db.from('unidade').select('*').order('nome'),
    db.from('classe').select('*').order('nome'),
    db.from('especialidades').select('*').order('nome'),
  ]);

  document.getElementById('unidade').innerHTML = '<option value="">Selecione...</option>' +
    (u.data||[]).map(x => `<option value="${x.id}">${x.nome}</option>`).join('');

  document.getElementById('classe').innerHTML = '<option value="">Selecione...</option>' +
    (c.data||[]).map(x => `<option value="${x.id}">${x.nome}</option>`).join('');

  document.getElementById('especBox').innerHTML = (e.data||[]).length
    ? (e.data||[]).map(x => `
        <label class="check-label">
          <input type="checkbox" class="espec-chk" value="${x.id}"/>
          ${x.nome}
        </label>
      `).join('')
    : '<p style="color:var(--c-muted);font-size:.8rem;padding:4px">Nenhuma especialidade cadastrada.</p>';
}

async function listar() {
  const { data } = await db.from('desbravador')
    .select('*, unidade(nome), classe(nome)')
    .order('nome');
  todosDesb = data || [];
  renderList(todosDesb);
}

function renderList(list) {
  const tbody = document.getElementById('tbody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">👤</div><p>Nenhum desbravador encontrado.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(d => `
    <tr>
      <td><strong>${d.nome}</strong></td>
      <td>${d.unidade?.nome || '—'}</td>
      <td><span class="badge badge-teal">${d.classe?.nome || '—'}</span></td>
      <td style="font-size:.8rem;color:var(--c-muted)">${fmtDate(d.data_nascimento)}</td>
      <td>
        <div style="display:flex;gap:6px">
          <a href="perfil-desbravador.html?id=${d.id}" class="btn btn-secondary btn-sm" style="text-decoration:none">Ver</a>
          <button class="btn btn-icon" onclick="editar('${d.id}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="excluir('${d.id}')">✕</button>
        </div>
      </td>
    </tr>
  `).join('');
}

document.getElementById('busca').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderList(todosDesb.filter(d => d.nome.toLowerCase().includes(q)));
});

async function editar(id) {
  const { data: d } = await db.from('desbravador').select('*').eq('id', id).single();
  const { data: es } = await db.from('desbravador_especialidade').select('especialidade_id').eq('desbravador_id', id);

  document.getElementById('editId').value = id;
  document.getElementById('nome').value = d.nome;
  document.getElementById('dataNasc').value = d.data_nascimento || '';
  document.getElementById('contato').value = d.contato || '';
  document.getElementById('unidade').value = d.unidade_id || '';
  document.getElementById('classe').value = d.classe_id || '';

  const esIds = (es||[]).map(e => e.especialidade_id);
  document.querySelectorAll('.espec-chk').forEach(c => {
    c.checked = esIds.includes(c.value);
  });

  document.getElementById('formTitle').textContent = 'Editar Desbravador';
  document.getElementById('btnSalvar').textContent = 'Salvar';
  document.getElementById('btnCancelar').style.display = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelar() {
  document.getElementById('editId').value = '';
  document.getElementById('nome').value = '';
  document.getElementById('dataNasc').value = '';
  document.getElementById('contato').value = '';
  document.getElementById('unidade').value = '';
  document.getElementById('classe').value = '';
  document.querySelectorAll('.espec-chk').forEach(c => c.checked = false);
  document.getElementById('formTitle').textContent = 'Novo Desbravador';
  document.getElementById('btnSalvar').textContent = 'Cadastrar';
  document.getElementById('btnCancelar').style.display = 'none';
}

async function excluir(id) {
  if (!confirm('Excluir este desbravador e todos os seus registros?')) return;
  await db.from('desbravador_especialidade').delete().eq('desbravador_id', id);
  await db.from('mensalidade').delete().eq('desbravador_id', id);
  const { error } = await db.from('desbravador').delete().eq('id', id);
  if (error) flash('Erro: ' + error.message, 'error');
  else { flash('Desbravador excluído.'); listar(); }
}

document.getElementById('btnSalvar').addEventListener('click', async () => {
  const id        = document.getElementById('editId').value;
  const nome      = document.getElementById('nome').value.trim();
  const data_nasc = document.getElementById('dataNasc').value || null;
  const contato   = document.getElementById('contato').value.trim();
  const unidadeId = document.getElementById('unidade').value;
  const classeId  = document.getElementById('classe').value;
  const esIds     = [...document.querySelectorAll('.espec-chk:checked')].map(c => c.value);

  if (!nome)      { flash('Informe o nome.', 'error'); return; }
  if (!unidadeId) { flash('Selecione a unidade.', 'error'); return; }
  if (!classeId)  { flash('Selecione a classe.', 'error'); return; }

  const payload = { nome, data_nascimento: data_nasc, contato: contato || null, unidade_id: unidadeId, classe_id: classeId };

  let desbrId = id;
  if (id) {
    const { error } = await db.from('desbravador').update(payload).eq('id', id);
    if (error) { flash(error.message, 'error'); return; }
  } else {
    const { data, error } = await db.from('desbravador').insert([payload]).select().single();
    if (error) { flash(error.message, 'error'); return; }
    desbrId = data.id;
  }

  // Sync especialidades
  await db.from('desbravador_especialidade').delete().eq('desbravador_id', desbrId);
  if (esIds.length) {
    await db.from('desbravador_especialidade').insert(
      esIds.map(e => ({ desbravador_id: desbrId, especialidade_id: e, concluida: true }))
    );
  }

  flash(id ? 'Desbravador atualizado!' : 'Desbravador cadastrado!');
  cancelar();
  listar();
});

document.getElementById('btnCancelar').addEventListener('click', cancelar);

carregarDrops();
listar();
</script>
</body>
</html>
