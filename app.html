<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sistema Bússola</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="supabase.js"></script>
  <script src="utils.js"></script>
</head>
<body>

<button class="sidebar-toggle" id="sidebarToggle">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="spa-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="compass">🧭</span>
      <div class="sidebar-brand-text">
        <strong>Sistema Bússola</strong>
        <small id="sidebarClube">Carregando...</small>
      </div>
    </div>

    <div class="sidebar-user">
      <div class="user-dot"></div>
      <div style="min-width:0">
        <div id="sidebarEmail" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.78rem"></div>
        <div id="sidebarPapel" style="font-size:.68rem;color:var(--c-teal);font-weight:600;margin-top:1px"></div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Geral</div>
      <a class="nav-item" data-view="dashboard">
        <span class="nav-icon">📊</span> Painel
      </a>

      <div class="nav-section-label" style="margin-top:8px">Cadastros</div>
      <a class="nav-item" data-view="conselheiros">
        <span class="nav-icon">🎖️</span> Conselheiros
      </a>
      <a class="nav-item" data-view="unidades">
        <span class="nav-icon">🏕️</span> Unidades
      </a>
      <a class="nav-item" data-view="desbravadores">
        <span class="nav-icon">👤</span> Desbravadores
      </a>
      <a class="nav-item" data-view="especialidades">
        <span class="nav-icon">⭐</span> Especialidades
      </a>

      <div class="nav-section-label" id="navFinanceiro" style="margin-top:8px">Financeiro</div>
      <a class="nav-item" data-view="mensalidades" id="navMensalidades">
        <span class="nav-icon">💳</span> Mensalidades
      </a>
      <a class="nav-item" data-view="caixa" id="navCaixa">
        <span class="nav-icon">💰</span> Caixa
      </a>

      <div class="nav-section-label" style="margin-top:8px">Administrativo</div>
      <a class="nav-item" data-view="patrimonio">
        <span class="nav-icon">📦</span> Patrimônio
      </a>
      <a class="nav-item" data-view="atas">
        <span class="nav-icon">📋</span> Atas e Atos
      </a>

      <div class="nav-section-label" style="margin-top:8px">Documentos</div>
      <a class="nav-item" data-view="relatorios">
        <span class="nav-icon">📄</span> Relatórios
      </a>

      <div id="navEquipe">
        <div class="nav-section-label" style="margin-top:8px">Gestão</div>
        <a class="nav-item" data-view="equipe">
          <span class="nav-icon">👥</span> Equipe do Clube
        </a>
        <a class="nav-item" data-view="convites">
          <span class="nav-icon">🔗</span> Convites
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <a class="nav-item danger" id="logoutBtn" style="border-radius:var(--radius-sm)">
        <span class="nav-icon">🚪</span> Sair
      </a>
    </div>
  </aside>

  <main class="main-content">
    <div id="viewContainer" class="fade-in"></div>
  </main>

</div>

<!-- Modal global -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="btn btn-icon" onclick="closeModal()" style="font-size:18px">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
