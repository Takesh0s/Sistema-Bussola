<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sistema Bússola — Perfil</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="dashboard.html"><span class="compass">🧭</span><div><span>Sistema Bússola</span></div></a>
  <div class="navbar-actions"><button class="btn btn-danger btn-sm" onclick="db.auth.signOut().then(()=>location.href='index.html')">Sair</button></div>
</nav>

<div class="page-wide fade-in">
  <div class="page-title-bar">
    <a class="back-btn" href="desbravador.html">←</a>
    <div><h1>👤 Perfil do Desbravador</h1></div>
  </div>

  <div class="two-col">
    <div>
      <div class="profile-hero">
        <div class="profile-avatar">👤</div>
        <h1 id="pNome">—</h1>
        <span class="badge badge-teal" id="pClasse">—</span>
        <p id="pUnidade" style="font-size:.85rem;margin-top:4px">—</p>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="icon">📄</div>
          <div><h2>Dados Pessoais</h2></div>
        </div>
        <div style="display:grid;gap:12px">
          <div><div class="stat-label">Data de Nascimento</div><div id="pNasc" style="color:var(--c-text);margin-top:4px">—</div></div>
          <div><div class="stat-label">Contato</div><div id="pContato" style="color:var(--c-text);margin-top:4px">—</div></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="icon">⭐</div>
        <div><h2>Especialidades Concluídas</h2></div>
      </div>
      <div id="especLista">
        <div class="empty-state"><div class="empty-icon">⭐</div><p>Carregando...</p></div>
      </div>

      <div style="margin-top:24px">
        <div class="card-header" style="margin-bottom:16px">
          <div class="icon">💳</div>
          <div><h2>Mensalidades</h2></div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Mês/Ano</th><th>Valor</th><th>Status</th></tr></thead>
            <tbody id="mensLista"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="utils.js"></script>
<script>
requireAuth();

const id = new URLSearchParams(location.search).get('id');
if (!id) location.href = 'desbravador.html';

(async () => {
  const { data: d } = await db.from('desbravador')
    .select('*, unidade(nome), classe(nome)')
    .eq('id', id).single();

  if (!d) { flash('Desbravador não encontrado.', 'error'); return; }

  document.getElementById('pNome').textContent    = d.nome;
  document.getElementById('pClasse').textContent  = d.classe?.nome || '—';
  document.getElementById('pUnidade').textContent = d.unidade?.nome ? '🏕️ ' + d.unidade.nome : '—';
  document.getElementById('pNasc').textContent    = fmtDate(d.data_nascimento);
  document.getElementById('pContato').textContent = d.contato || '—';
  document.title = `Bússola — ${d.nome}`;

  // Especialidades
  const { data: es } = await db.from('desbravador_especialidade')
    .select('*, especialidade:especialidade_id(nome)')
    .eq('desbravador_id', id);

  const especLista = document.getElementById('especLista');
  if (!es?.length) {
    especLista.innerHTML = `<div class="empty-state"><div class="empty-icon">⭐</div><p>Nenhuma especialidade registrada.</p></div>`;
  } else {
    especLista.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:8px;padding:4px">${
      es.map(e => `<span class="badge badge-teal">⭐ ${e.especialidade?.nome || '?'}</span>`).join('')
    }</div>`;
  }

  // Mensalidades
  const { data: ms } = await db.from('mensalidade')
    .select('*').eq('desbravador_id', id)
    .order('ano', { ascending: false }).order('mes', { ascending: false });

  const mensLista = document.getElementById('mensLista');
  if (!ms?.length) {
    mensLista.innerHTML = `<tr><td colspan="3"><div class="empty-state" style="padding:20px"><p>Sem mensalidades.</p></div></td></tr>`;
  } else {
    mensLista.innerHTML = ms.map(m => `
      <tr>
        <td>${MESES[m.mes]} / ${m.ano}</td>
        <td>${brl(m.valor)}</td>
        <td><span class="badge ${m.pago ? 'badge-green' : 'badge-red'}">${m.pago ? '✓ Pago' : '✗ Em aberto'}</span></td>
      </tr>
    `).join('');
  }
})();
</script>
</body>
</html>
