<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sistema Bússola — Mensalidades</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="dashboard.html"><span class="compass">🧭</span><div><span>Sistema Bússola</span></div></a>
  <div class="navbar-actions"><button class="btn btn-danger btn-sm" onclick="db.auth.signOut().then(()=>location.href='index.html')">Sair</button></div>
</nav>

<div class="page-wide fade-in">
  <div class="page-title-bar">
    <a class="back-btn" href="dashboard.html">←</a>
    <div><h1>💳 Controle de Mensalidades</h1><p>Registro e acompanhamento de pagamentos</p></div>
  </div>

  <div class="two-col">
    <!-- Form -->
    <div class="card">
      <div class="card-header">
        <div class="icon">💳</div>
        <div><h2>Registrar Mensalidade</h2></div>
      </div>

      <div class="form-group"><label>Desbravador</label>
        <select id="desbravador"><option value="">Selecione...</option></select>
      </div>
      <div class="form-group"><label>Mês</label>
        <select id="mes">
          <option value="">Selecione...</option>
          <option value="1">Janeiro</option><option value="2">Fevereiro</option>
          <option value="3">Março</option><option value="4">Abril</option>
          <option value="5">Maio</option><option value="6">Junho</option>
          <option value="7">Julho</option><option value="8">Agosto</option>
          <option value="9">Setembro</option><option value="10">Outubro</option>
          <option value="11">Novembro</option><option value="12">Dezembro</option>
        </select>
      </div>
      <div class="form-group"><label>Ano</label>
        <input type="number" id="ano" placeholder="2025" min="2020" max="2099"/>
      </div>
      <div class="form-group"><label>Valor (R$)</label>
        <input type="number" id="valor" placeholder="0,00" min="0" step="0.01"/>
      </div>
      <div style="margin-bottom:16px">
        <label class="check-label">
          <input type="checkbox" id="pago"/>
          Mensalidade já paga
        </label>
      </div>

      <button class="btn btn-primary" id="btnRegistrar">Registrar Mensalidade</button>
    </div>

    <!-- List -->
    <div class="card">
      <div class="card-header">
        <div class="icon">📋</div>
        <div><h2>Mensalidades Registradas</h2></div>
      </div>

      <!-- Filtros -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <select id="filtroDesb" style="margin:0"><option value="">Todos os membros</option></select>
        <select id="filtroStatus" style="margin:0">
          <option value="">Todos os status</option>
          <option value="pago">Pago</option>
          <option value="aberto">Em aberto</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th>Desbravador</th><th>Competência</th><th>Valor</th><th>Status</th><th></th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="utils.js"></script>
<script>
requireAuth();

let todos = [];

async function carregarDesb() {
  const { data } = await db.from('desbravador').select('id, nome').order('nome');
  const opts = (data||[]).map(d => `<option value="${d.id}">${d.nome}</option>`).join('');
  document.getElementById('desbravador').innerHTML = '<option value="">Selecione...</option>' + opts;
  document.getElementById('filtroDesb').innerHTML  = '<option value="">Todos os membros</option>' + opts;
}

async function listar() {
  const { data } = await db.from('mensalidade')
    .select('*, desbravador:desbravador_id(nome)')
    .order('ano', { ascending: false }).order('mes', { ascending: false });
  todos = data || [];
  aplicarFiltros();
}

function aplicarFiltros() {
  const dId    = document.getElementById('filtroDesb').value;
  const status = document.getElementById('filtroStatus').value;

  let lista = todos;
  if (dId)    lista = lista.filter(m => m.desbravador_id === dId);
  if (status === 'pago')   lista = lista.filter(m => m.pago);
  if (status === 'aberto') lista = lista.filter(m => !m.pago);

  const tbody = document.getElementById('tbody');
  if (!lista.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><p>Nenhuma mensalidade encontrada.</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = lista.map(m => `
    <tr>
      <td><strong>${m.desbravador?.nome || '—'}</strong></td>
      <td style="font-size:.85rem">${MESES[m.mes]}/${m.ano}</td>
      <td style="font-family:var(--font-mono)">${brl(m.valor)}</td>
      <td>
        <span class="badge ${m.pago ? 'badge-green' : 'badge-red'}">
          ${m.pago ? '✓ Pago' : '✗ Em aberto'}
        </span>
      </td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-icon" title="${m.pago ? 'Marcar como não pago' : 'Marcar como pago'}"
            onclick="togglePago('${m.id}', ${m.pago})">${m.pago ? '↩' : '✓'}</button>
          <button class="btn btn-danger btn-sm" onclick="excluir('${m.id}')">✕</button>
        </div>
      </td>
    </tr>
  `).join('');
}

async function togglePago(id, atual) {
  const { error } = await db.from('mensalidade').update({ pago: !atual }).eq('id', id);
  if (error) flash(error.message, 'error');
  else { flash(atual ? 'Marcado como em aberto.' : 'Marcado como pago!'); listar(); }
}

async function excluir(id) {
  if (!confirm('Excluir este registro de mensalidade?')) return;
  const { error } = await db.from('mensalidade').delete().eq('id', id);
  if (error) flash(error.message, 'error');
  else { flash('Registro excluído.'); listar(); }
}

document.getElementById('filtroDesb').addEventListener('change', aplicarFiltros);
document.getElementById('filtroStatus').addEventListener('change', aplicarFiltros);

document.getElementById('btnRegistrar').addEventListener('click', async () => {
  const desbrId = document.getElementById('desbravador').value;
  const mes     = parseInt(document.getElementById('mes').value);
  const ano     = parseInt(document.getElementById('ano').value);
  const valor   = parseFloat(document.getElementById('valor').value);
  const pago    = document.getElementById('pago').checked;

  if (!desbrId)      { flash('Selecione o desbravador.', 'error'); return; }
  if (!mes)          { flash('Selecione o mês.', 'error'); return; }
  if (!ano || ano < 2020) { flash('Informe o ano corretamente.', 'error'); return; }
  if (isNaN(valor) || valor < 0) { flash('Informe o valor.', 'error'); return; }

  const { error } = await db.from('mensalidade').insert([{
    desbravador_id: desbrId, mes, ano, valor, pago
  }]);

  if (error) { flash(error.message, 'error'); return; }

  flash('Mensalidade registrada!');
  document.getElementById('desbravador').value = '';
  document.getElementById('mes').value = '';
  document.getElementById('ano').value = '';
  document.getElementById('valor').value = '';
  document.getElementById('pago').checked = false;
  listar();
});

// Preenche ano atual por padrão
document.getElementById('ano').value = new Date().getFullYear();

carregarDesb();
listar();
</script>
</body>
</html>
