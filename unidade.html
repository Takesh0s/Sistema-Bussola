<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sistema Bússola — Unidades</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="dashboard.html"><span class="compass">🧭</span><div><span>Sistema Bússola</span></div></a>
  <div class="navbar-actions"><button class="btn btn-danger btn-sm" onclick="db.auth.signOut().then(()=>location.href='index.html')">Sair</button></div>
</nav>

<div class="page-wide fade-in">
  <div class="page-title-bar">
    <a class="back-btn" href="dashboard.html">←</a>
    <div><h1>🏕️ Gestão de Unidades</h1><p>Cadastrar e gerenciar as unidades do clube</p></div>
  </div>

  <div class="two-col">
    <!-- Form -->
    <div class="card">
      <div class="card-header">
        <div class="icon">🏕️</div>
        <div><h2 id="formTitle">Nova Unidade</h2></div>
      </div>

      <input type="hidden" id="editId"/>

      <div class="form-group"><label>Nome da Unidade</label>
        <input type="text" id="nome" placeholder="Ex: Unidade Águias"/>
      </div>
      <div class="form-group">
        <label>Conselheiro Titular</label>
        <select id="conselheiro"><option value="">Selecione...</option></select>
      </div>
      <div class="form-group">
        <label>Associado 1 <span style="color:var(--c-muted);font-weight:400">(opcional)</span></label>
        <select id="assoc1"><option value="">Nenhum</option></select>
      </div>
      <div class="form-group">
        <label>Associado 2 <span style="color:var(--c-muted);font-weight:400">(opcional)</span></label>
        <select id="assoc2"><option value="">Nenhum</option></select>
      </div>

      <div style="display:flex;gap:10px;margin-top:4px">
        <button class="btn btn-primary" id="btnSalvar">Cadastrar Unidade</button>
        <button class="btn btn-secondary" id="btnCancelar" style="display:none">Cancelar</button>
      </div>
    </div>

    <!-- List -->
    <div class="card">
      <div class="card-header">
        <div class="icon">📋</div>
        <div><h2>Unidades Cadastradas</h2></div>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th>Unidade</th><th>Membros</th><th></th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="utils.js"></script>
<script>
requireAuth();

let conselheiros = [];

async function carregarConselheiros() {
  const { data } = await db.from('conselheiro').select('*').order('nome');
  conselheiros = data || [];
  const opts = conselheiros.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
  document.getElementById('conselheiro').innerHTML = '<option value="">Selecione...</option>' + opts;
  document.getElementById('assoc1').innerHTML = '<option value="">Nenhum</option>' + opts;
  document.getElementById('assoc2').innerHTML = '<option value="">Nenhum</option>' + opts;
}

async function listar() {
  // Busca unidades + seus membros via unidade_membro
  const { data: unidades } = await db.from('unidade').select('*').order('nome');
  const { data: membros } = await supabase
    .from('unidade_membro')
    .select('unidade_id, tipo, conselheiro:conselheiro_id(id, nome)');

  const tbody = document.getElementById('tbody');
  if (!unidades?.length) {
    tbody.innerHTML = `<tr><td colspan="3"><div class="empty-state"><div class="empty-icon">🏕️</div><p>Nenhuma unidade cadastrada.</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = unidades.map(u => {
    const mems = (membros || []).filter(m => m.unidade_id === u.id);
    const titular = mems.find(m => m.tipo === 'conselheiro');
    const assocs  = mems.filter(m => m.tipo === 'associado');
    const membrosStr = [
      titular ? `<span class="badge badge-teal">${titular.conselheiro?.nome}</span>` : '',
      ...assocs.map(a => `<span class="chip">${a.conselheiro?.nome}</span>`)
    ].filter(Boolean).join(' ') || '—';

    return `<tr>
      <td><strong>${u.nome}</strong></td>
      <td style="font-size:.85rem">${membrosStr}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-icon" title="Editar" onclick="editar('${u.id}','${u.nome}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="excluir('${u.id}')">Excluir</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function editar(id, nome) {
  // Carrega os membros atuais desta unidade
  const { data: mems } = await supabase
    .from('unidade_membro')
    .select('tipo, conselheiro_id')
    .eq('unidade_id', id);

  const titular = mems?.find(m => m.tipo === 'conselheiro');
  const assocs  = mems?.filter(m => m.tipo === 'associado') || [];

  document.getElementById('editId').value = id;
  document.getElementById('nome').value = nome;
  document.getElementById('conselheiro').value = titular?.conselheiro_id || '';
  document.getElementById('assoc1').value = assocs[0]?.conselheiro_id || '';
  document.getElementById('assoc2').value = assocs[1]?.conselheiro_id || '';
  document.getElementById('formTitle').textContent = 'Editar Unidade';
  document.getElementById('btnSalvar').textContent = 'Salvar Alterações';
  document.getElementById('btnCancelar').style.display = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelar() {
  document.getElementById('editId').value = '';
  document.getElementById('nome').value = '';
  document.getElementById('conselheiro').value = '';
  document.getElementById('assoc1').value = '';
  document.getElementById('assoc2').value = '';
  document.getElementById('formTitle').textContent = 'Nova Unidade';
  document.getElementById('btnSalvar').textContent = 'Cadastrar Unidade';
  document.getElementById('btnCancelar').style.display = 'none';
}

async function excluir(id) {
  if (!confirm('Excluir esta unidade? Os desbravadores vinculados ficarão sem unidade.')) return;
  await db.from('unidade_membro').delete().eq('unidade_id', id);
  const { error } = await db.from('unidade').delete().eq('id', id);
  if (error) flash('Erro: ' + error.message, 'error');
  else { flash('Unidade excluída.'); listar(); }
}

document.getElementById('btnSalvar').addEventListener('click', async () => {
  const id    = document.getElementById('editId').value;
  const nome  = document.getElementById('nome').value.trim();
  const cId   = document.getElementById('conselheiro').value;
  const a1    = document.getElementById('assoc1').value;
  const a2    = document.getElementById('assoc2').value;

  if (!nome) { flash('Informe o nome da unidade.', 'error'); return; }
  if (!cId)  { flash('Selecione o conselheiro titular.', 'error'); return; }

  let unidadeId = id;

  if (id) {
    const { error } = await db.from('unidade').update({ nome }).eq('id', id);
    if (error) { flash(error.message, 'error'); return; }
    // Remove membros antigos para reinserir
    await db.from('unidade_membro').delete().eq('unidade_id', id);
  } else {
    const { data, error } = await db.from('unidade').insert([{ nome }]).select().single();
    if (error) { flash(error.message, 'error'); return; }
    unidadeId = data.id;
  }

  // Insere membros na tabela unidade_membro
  const membros = [{ unidade_id: unidadeId, conselheiro_id: cId, tipo: 'conselheiro' }];
  if (a1) membros.push({ unidade_id: unidadeId, conselheiro_id: a1, tipo: 'associado' });
  if (a2) membros.push({ unidade_id: unidadeId, conselheiro_id: a2, tipo: 'associado' });

  const { error: errMem } = await db.from('unidade_membro').insert(membros);
  if (errMem) { flash('Unidade salva, mas erro ao vincular membros: ' + errMem.message, 'error'); return; }

  flash(id ? 'Unidade atualizada!' : 'Unidade cadastrada!');
  cancelar();
  listar();
});

document.getElementById('btnCancelar').addEventListener('click', cancelar);
carregarConselheiros();
listar();
</script>
</body>
</html>
