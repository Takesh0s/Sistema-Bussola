<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sistema Bússola — Conselheiros</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="dashboard.html"><span class="compass">🧭</span><div><span>Sistema Bússola</span></div></a>
  <div class="navbar-actions"><button class="btn btn-danger btn-sm" onclick="db.auth.signOut().then(()=>location.href='index.html')">Sair</button></div>
</nav>

<div class="page-wide fade-in">
  <div class="page-title-bar">
    <a class="back-btn" href="dashboard.html">←</a>
    <div><h1>🎖️ Conselheiros</h1><p>Cadastro de líderes e conselheiros do clube</p></div>
  </div>

  <div class="two-col">
    <!-- Form -->
    <div class="card">
      <div class="card-header">
        <div class="icon">🎖️</div>
        <div><h2>Novo Conselheiro</h2></div>
      </div>

      <div class="form-group"><label>Nome Completo</label><input type="text" id="nome" placeholder="Nome do conselheiro"/></div>
      <div class="form-group"><label>Telefone / WhatsApp</label><input type="text" id="telefone" placeholder="(00) 00000-0000"/></div>
      <div class="form-group"><label>E-mail</label><input type="email" id="email" placeholder="email@exemplo.com"/></div>

      <button class="btn btn-primary" id="btnCadastrar">Cadastrar Conselheiro</button>
    </div>

    <!-- List -->
    <div class="card">
      <div class="card-header">
        <div class="icon">📋</div>
        <div><h2>Conselheiros Cadastrados</h2></div>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th>Nome</th><th>Telefone</th><th>E-mail</th><th></th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="utils.js"></script>
<script>
requireAuth();

async function listar() {
  const { data } = await db.from('conselheiro').select('*').order('nome');
  const tbody = document.getElementById('tbody');

  if (!data?.length) {
    tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">🎖️</div><p>Nenhum conselheiro cadastrado.</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = data.map(c => `
    <tr>
      <td>${c.nome}</td>
      <td>${c.telefone || '—'}</td>
      <td>${c.email || '—'}</td>
      <td>
        <button class="btn btn-danger btn-sm" onclick="excluir('${c.id}')">Excluir</button>
      </td>
    </tr>
  `).join('');
}

async function excluir(id) {
  if (!confirm('Excluir este conselheiro?')) return;
  const { error } = await db.from('conselheiro').delete().eq('id', id);
  if (error) flash('Erro: ' + error.message, 'error');
  else { flash('Conselheiro excluído.'); listar(); }
}

document.getElementById('btnCadastrar').addEventListener('click', async () => {
  const nome     = document.getElementById('nome').value.trim();
  const telefone = document.getElementById('telefone').value.trim();
  const email    = document.getElementById('email').value.trim();

  if (!nome) { flash('Informe o nome.', 'error'); return; }

  const { error } = await db.from('conselheiro').insert([{ nome, telefone, email }]);
  if (error) { flash(error.message, 'error'); return; }

  flash('Conselheiro cadastrado!');
  document.getElementById('nome').value = '';
  document.getElementById('telefone').value = '';
  document.getElementById('email').value = '';
  listar();
});

listar();
</script>
</body>
</html>
