<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sistema Bússola — Especialidades</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="dashboard.html"><span class="compass">🧭</span><div><span>Sistema Bússola</span></div></a>
  <div class="navbar-actions"><button class="btn btn-danger btn-sm" onclick="supabase.auth.signOut().then(()=>location.href='index.html')">Sair</button></div>
</nav>

<div class="page-wide fade-in">
  <div class="page-title-bar">
    <a class="back-btn" href="dashboard.html">←</a>
    <div><h1>⭐ Especialidades</h1><p>Cadastro de especialidades disponíveis no clube</p></div>
  </div>

  <div class="two-col">
    <!-- Form -->
    <div class="card">
      <div class="card-header">
        <div class="icon">⭐</div>
        <div><h2 id="formTitle">Nova Especialidade</h2></div>
      </div>

      <input type="hidden" id="editId"/>

      <div class="form-group"><label>Nome da Especialidade</label>
        <input type="text" id="nome" placeholder="Ex: Culinária, Astronomia..."/>
      </div>
      <div class="form-group"><label>Descrição <span style="color:var(--c-muted);font-weight:400">(opcional)</span></label>
        <textarea id="descricao" placeholder="Breve descrição da especialidade..." rows="3"></textarea>
      </div>

      <div style="display:flex;gap:10px;margin-top:4px">
        <button class="btn btn-primary" id="btnSalvar">Cadastrar</button>
        <button class="btn btn-secondary" id="btnCancelar" style="display:none">Cancelar</button>
      </div>

      <!-- Import rápido -->
      <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--c-border)">
        <h3 style="margin-bottom:12px">Importar Especialidades Padrão</h3>
        <p style="font-size:.82rem;color:var(--c-muted);margin-bottom:12px">
          Adicione de uma vez as especialidades oficiais da DSA ao seu banco de dados.
        </p>
        <button class="btn btn-secondary" id="btnImportar">⬇ Importar Lista Oficial</button>
      </div>
    </div>

    <!-- List -->
    <div class="card">
      <div class="card-header">
        <div class="icon">📋</div>
        <div><h2>Especialidades Cadastradas</h2><p id="countLabel" style="font-size:.8rem;margin:0"></p></div>
      </div>

      <input type="text" id="busca" placeholder="🔍  Buscar especialidade..." style="margin-bottom:12px"/>

      <div class="table-wrap">
        <table>
          <thead><tr><th>Nome</th><th>Descrição</th><th>Desbravadores</th><th></th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="utils.js"></script>
<script>
requireAuth();

// Amostra das especialidades oficiais DSA
const ESPEC_PADRAO = [
  'Astronomia','Aves','Bordado','Caminhada','Camping','Ciclismo',
  'Costura','Culinária','Desenho','Ecologia','Educação para a Saúde',
  'Esportes Aquáticos','Floricultura','Fotografia','Horticultura',
  'Jardinagem','Leitura','Marcenaria','Modelismo','Música',
  'Natação','Nutrição','Origami','Pintura','Primeiros Socorros',
  'Reciclagem','Teatro','Tricô e Crochê','Xadrez','Zoologia'
];

let todos = [];

async function listar() {
  const { data } = await supabase.from('especialidades').select('*').order('nome');
  todos = data || [];
  document.getElementById('countLabel').textContent = `${todos.length} cadastrada${todos.length !== 1 ? 's' : ''}`;
  render(todos);
}

async function render(lista) {
  const tbody = document.getElementById('tbody');

  if (!lista.length) {
    tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">⭐</div><p>Nenhuma especialidade cadastrada.</p></div></td></tr>`;
    return;
  }

  // Busca contagem de desbravadores por especialidade
  const { data: counts } = await supabase.from('desbravador_especialidade')
    .select('especialidade_id');
  const countMap = {};
  (counts||[]).forEach(c => { countMap[c.especialidade_id] = (countMap[c.especialidade_id]||0) + 1; });

  tbody.innerHTML = lista.map(e => `
    <tr>
      <td><strong>${e.nome}</strong></td>
      <td style="font-size:.82rem;color:var(--c-muted)">${e.descricao || '—'}</td>
      <td>
        <span class="badge badge-teal">${countMap[e.id] || 0}</span>
      </td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-icon" onclick="editar('${e.id}','${e.nome.replace(/'/g,"\\'")}','${(e.descricao||'').replace(/'/g,"\\'")}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="excluir('${e.id}')">✕</button>
        </div>
      </td>
    </tr>
  `).join('');
}

document.getElementById('busca').addEventListener('input', e => {
  render(todos.filter(x => x.nome.toLowerCase().includes(e.target.value.toLowerCase())));
});

function editar(id, nome, descricao) {
  document.getElementById('editId').value = id;
  document.getElementById('nome').value = nome;
  document.getElementById('descricao').value = descricao;
  document.getElementById('formTitle').textContent = 'Editar Especialidade';
  document.getElementById('btnSalvar').textContent = 'Salvar';
  document.getElementById('btnCancelar').style.display = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelar() {
  document.getElementById('editId').value = '';
  document.getElementById('nome').value = '';
  document.getElementById('descricao').value = '';
  document.getElementById('formTitle').textContent = 'Nova Especialidade';
  document.getElementById('btnSalvar').textContent = 'Cadastrar';
  document.getElementById('btnCancelar').style.display = 'none';
}

async function excluir(id) {
  if (!confirm('Excluir esta especialidade? Ela será removida dos desbravadores vinculados.')) return;
  await supabase.from('desbravador_especialidade').delete().eq('especialidade_id', id);
  const { error } = await supabase.from('especialidades').delete().eq('id', id);
  if (error) flash(error.message, 'error');
  else { flash('Especialidade excluída.'); listar(); }
}

document.getElementById('btnSalvar').addEventListener('click', async () => {
  const id        = document.getElementById('editId').value;
  const nome      = document.getElementById('nome').value.trim();
  const descricao = document.getElementById('descricao').value.trim();

  if (!nome) { flash('Informe o nome da especialidade.', 'error'); return; }

  const payload = { nome, descricao: descricao || null };
  const op = id
    ? supabase.from('especialidades').update(payload).eq('id', id)
    : supabase.from('especialidades').insert([payload]);

  const { error } = await op;
  if (error) { flash(error.message, 'error'); return; }

  flash(id ? 'Especialidade atualizada!' : 'Especialidade cadastrada!');
  cancelar(); listar();
});

document.getElementById('btnCancelar').addEventListener('click', cancelar);

document.getElementById('btnImportar').addEventListener('click', async () => {
  const btn = document.getElementById('btnImportar');
  const existentes = todos.map(e => e.nome.toLowerCase());
  const novas = ESPEC_PADRAO.filter(n => !existentes.includes(n.toLowerCase()));

  if (!novas.length) { flash('Todas as especialidades padrão já estão cadastradas.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Importando...';

  const { error } = await supabase.from('especialidades').insert(novas.map(nome => ({ nome })));

  btn.disabled = false;
  btn.innerHTML = '⬇ Importar Lista Oficial';

  if (error) { flash(error.message, 'error'); return; }
  flash(`${novas.length} especialidade(s) importada(s)!`);
  listar();
});

listar();
</script>
</body>
</html>
