<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sistema Bússola — Login</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-card fade-in">

    <div class="auth-logo">
      <span class="compass-big">🧭</span>
      <h1>Sistema Bússola</h1>
      <p>Plataforma de Administração para Clubes de Desbravadores</p>
    </div>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email"/>
    </div>

    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn btn-primary" id="loginBtn" style="margin-top:8px">
      Entrar
    </button>

    <div class="divider">ou</div>

    <button class="btn btn-google" id="googleBtn">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google"/>
      Entrar com Google
    </button>

    <p style="text-align:center;margin-top:24px;font-size:.85rem;">
      Ainda não tem conta?
      <a href="cadastro.html" style="color:var(--c-teal);font-weight:600;text-decoration:none;margin:0"> Cadastre-se</a>
    </p>
  </div>
</div>

<script src="supabase.js"></script>
<script>
  // Redireciona se já logado
  db.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'dashboard.html';
  });

  function showFlash(msg, type = 'error') {
    const el = document.createElement('div');
    el.className = `flash flash-${type}`;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  document.getElementById('loginBtn').addEventListener('click', async () => {
    const btn = document.getElementById('loginBtn');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) { showFlash('Preencha e-mail e senha.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Entrando...';

    const { error } = await db.auth.signInWithPassword({ email, password });

    if (error) {
      showFlash(error.message.includes('Invalid') ? 'E-mail ou senha incorretos.' : error.message);
      btn.disabled = false;
      btn.textContent = 'Entrar';
    } else {
      window.location.href = 'dashboard.html';
    }
  });

  // Enter key
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  });

  document.getElementById('googleBtn').addEventListener('click', () => {
    const base = window.location.origin.includes('localhost')
      ? 'http://localhost:8080'
      : window.location.origin;
    db.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: base + '/dashboard.html' }
    });
  });
</script>
</body>
</html>
